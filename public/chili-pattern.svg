<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <g id="chili">
      <path d="M0,20 C30,10 70,12 100,2 C108,0 112,4 110,10 C95,18 60,30 30,32 C8,33 -4,28 0,20 Z"
            fill="none" stroke="#B8311F" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M100,2 C104,-4 110,-6 116,-4 C118,-2 116,2 110,4" fill="none" stroke="#3D5A2D" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M10,22 C25,18 50,20 75,14" fill="none" stroke="#B8311F" stroke-width="0.7" opacity="0.55"/>
      <path d="M14,26 C30,23 55,24 78,18" fill="none" stroke="#B8311F" stroke-width="0.6" opacity="0.45"/>
    </g>
    <g id="slice">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#B8311F" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="5.5" fill="none" stroke="#B8311F" stroke-width="0.8" opacity="0.7"/>
      <circle cx="-1.5" cy="-1" r="1" fill="#B8311F" opacity="0.6"/>
      <circle cx="2" cy="1.5" r="1" fill="#B8311F" opacity="0.6"/>
      <circle cx="0" cy="3" r="0.9" fill="#B8311F" opacity="0.6"/>
    </g>
    <g id="flame">
      <path d="M0,0 C-4,-4 -4,-9 0,-14 C2,-10 4,-8 3,-4 C5,-6 6,-3 4,0 Z"
            fill="none" stroke="#B8311F" stroke-width="1.2"/>
    </g>
  </defs>

  <use href="#chili" x="20"  y="40"  transform="rotate(-12 70 50)"/>
  <use href="#chili" x="170" y="80"  transform="rotate(18 220 90)"/>
  <use href="#chili" x="40"  y="180" transform="rotate(8 90 190)"/>
  <use href="#chili" x="180" y="230" transform="rotate(-20 230 240)"/>

  <use href="#slice" x="160" y="60"/>
  <use href="#slice" x="60"  y="140"/>
  <use href="#slice" x="260" y="170"/>
  <use href="#slice" x="120" y="270"/>

  <use href="#flame" x="130" y="120"/>
  <use href="#flame" x="280" y="50"/>
  <use href="#flame" x="30"  y="270"/>
  <use href="#flame" x="240" y="290"/>

  <circle cx="100" cy="80"  r="1.2" fill="#B8311F" opacity="0.6"/>
  <circle cx="220" cy="160" r="1.2" fill="#B8311F" opacity="0.6"/>
  <circle cx="80"  cy="240" r="1.2" fill="#B8311F" opacity="0.6"/>
  <circle cx="290" cy="240" r="1.2" fill="#B8311F" opacity="0.6"/>
</svg>
