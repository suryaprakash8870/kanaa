<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="wax" cx="38%" cy="34%" r="70%">
      <stop offset="0" stop-color="#E8553F"/>
      <stop offset="0.55" stop-color="#C0301F"/>
      <stop offset="1" stop-color="#7A1A0E"/>
    </radialGradient>
    <radialGradient id="waxShine" cx="30%" cy="22%" r="40%">
      <stop offset="0" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="drip" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency="1.8" numOctaves="2" seed="2" type="fractalNoise"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>

  <!-- Outer drips / irregular edge -->
  <g filter="url(#rough)">
    <path d="M 100 12
             C 138 12, 174 38, 180 78
             C 186 118, 166 152, 140 172
             C 124 184, 110 190, 96 190
             C 70 188, 40 168, 26 134
             C 16 108, 20 76, 42 48
             C 60 26, 80 14, 100 12 Z"
          fill="url(#wax)"/>
  </g>

  <!-- Shine highlight -->
  <ellipse cx="78" cy="70" rx="44" ry="30" fill="url(#waxShine)"/>

  <!-- Inner ring with text -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#7A1A0E" stroke-width="1" opacity="0.55"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#7A1A0E" stroke-width="1" opacity="0.55"/>

  <!-- Curved text: EST. IN TRADITION -->
  <defs>
    <path id="topArc" d="M 38 100 A 62 62 0 0 1 162 100"/>
    <path id="bottomArc" d="M 40 100 A 60 60 0 0 0 160 100"/>
  </defs>
  <text fill="#F7E4C6" font-family="Georgia, serif" font-weight="700" font-size="11" letter-spacing="4">
    <textPath href="#topArc" startOffset="18%">KANAA · KITCHEN</textPath>
  </text>
  <text fill="#F7E4C6" font-family="Georgia, serif" font-weight="700" font-size="10" letter-spacing="5">
    <textPath href="#bottomArc" startOffset="12%">EST. IN TRADITION</textPath>
  </text>

  <!-- Monogram K -->
  <g transform="translate(100 110)">
    <text x="0" y="10" text-anchor="middle" fill="#F7E4C6" font-family="Georgia, serif" font-style="italic" font-weight="900" font-size="56">K</text>
    <!-- small leaves flanking -->
    <path d="M -34 2 C -30 -6, -22 -6, -18 0" stroke="#F7E4C6" stroke-width="1.2" fill="none" opacity="0.85"/>
    <path d="M 34 2 C 30 -6, 22 -6, 18 0" stroke="#F7E4C6" stroke-width="1.2" fill="none" opacity="0.85"/>
  </g>

  <!-- Texture speckles -->
  <g fill="#7A1A0E" opacity="0.35">
    <circle cx="58" cy="150" r="1.2"/>
    <circle cx="150" cy="60" r="0.8"/>
    <circle cx="138" cy="154" r="1"/>
    <circle cx="44" cy="90" r="0.8"/>
    <circle cx="120" cy="46" r="1"/>
  </g>
</svg>
